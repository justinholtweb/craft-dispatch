actor: Tester
paths:
  tests: tests
  output: tests/_output
  data: tests/_data
  support: tests/_support
  envs: tests/_envs
bootstrap: _bootstrap.php
modules:
  config:
    \craft\test\Craft:
      configFile: 'tests/_craft/config/test.php'
      entryUrl: 'https://craft-dispatch.ddev.site/index.php'
      projectConfig: {}
      migrations: []
      plugins:
        - class: justinholtweb\dispatch\Plugin
          handle: dispatch
      cleanup: true
      transaction: true
      dbSetup: {clean: true, setupCraft: true}
